name: Auto Build MessageRouterVue

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/**'
      - 'vite.config.js'
      - 'package.json'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        
      - name: 安装 Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: 安装依赖并执行打包
        run: |
          npm install
          npm run build
          
      - name: 将机器人生成的 dist 文件夹提交到仓库
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add plugins.v2/messageroutervue/dist -f
          git commit -m "🤖 自动构建 MessageRouterVue 前端产物" || echo "没有需要更新的内容"
          git push
